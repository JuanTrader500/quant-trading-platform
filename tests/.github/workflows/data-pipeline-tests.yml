name: DataPipeline Tests

on:
  push:
    paths:
      - "src/DataPipeline/**"
      - "tests/pipeline/**"
  pull_request:
    paths:
      - "src/DataPipeline/**"
      - "tests/pipeline/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r tests/pipeline/requirements-test.txt

      - name: Ejecutar tests del DataPipeline
        run: pytest tests/pipeline -q
