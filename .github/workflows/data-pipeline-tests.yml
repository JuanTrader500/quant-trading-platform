name: DataPipeline Tests

on:
  push:
    paths:
      - "src/DataPipeline/**"
      - "tests/data_pipeline/**" # Corregido: agregada la carpeta raíz 'tests/'
  pull_request:
    paths:
      - "src/DataPipeline/**"
      - "tests/data_pipeline/**" # Corregido: agregada la carpeta raíz 'tests/'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Corregido: Versión estable para producción

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r tests/data_pipeline/requirements-test.txt # Corregido el path

      - name: Ejecutar tests del DataPipeline
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/data_pipeline -q # Corregido el path