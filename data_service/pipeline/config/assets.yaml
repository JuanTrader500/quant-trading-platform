# DataPipeline/config/assets.yaml
# Lista maestra de activos a extraer vía yfinance.
#
# ticker : símbolo yfinance
# name   : identificador corto (debe existir en extraction.FILENAME_MAP,
#          o se usará "<name>_data_daily.csv" por defecto)
# vol    : true  → índice de volatilidad (agrega columna avg_hl)
#          false → equity / índice de precio (agrega columna pct_move)

assets:
  - ticker: "^GSPC"
    name: "sp500"
    vol: false

  - ticker: "^NDX"
    name: "nq"
    vol: false

  - ticker: "^VIX"
    name: "vix"
    vol: true

  - ticker: "^VXN"
    name: "vxn"
    vol: true
